data:
  vocab_path: #Add path of your cell ids token vocab
  area_vocab_path: # Add path of your tracking area ids token vocab
  train_path: # Add path of your training data
  val_path: # Add path of your validation data
  test_path: # Add path of your testing data

model:
  embedding_dim: 128
  user_embedding_dim: 64
  area_embedding_dim: 64
  hidden_dim: 256
  num_layers: 2
  nhead: 2
  max_seq_len: 100
  num_users: 5619
  dropout: 0.3

training:
  epochs: 20
  batch_size: 256
  lr: 1.0e-4
  weight_decay: 5.0e-4
  warmup_steps: 5
  area_loss_weight: 0.3
  max_grad_norm: 1.0
  lr_min_threshold: 1.0e-6
  scheduler_factor: 0.5
  scheduler_patience: 3
  num_workers: 4

distributed:
  gpus: "0,1,2"

output:
  dir: "./results"
  model_name: "SCellMo"

inference:
  checkpoint: "best_acc_model.pth"
  device: "cuda:0"
  batch_size: 512
  topk: [1, 3, 5, 7, 10]
